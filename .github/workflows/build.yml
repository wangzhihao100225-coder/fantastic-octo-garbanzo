name: Build SideStore
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 安装基础工具
        run: brew install ldid

      - name: 编译生成IPA
        run: make build fakesign ipa

      - name: 上传IPA文件
        uses: actions/upload-artifact@v4
        with:
          name: SideStore.ipa
          path: build/ipa/*.ipa
